<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📊 AI助理財經新聞總覽 📈</title>
    <style>
        body { 
            font-family: 'Helvetica Neue', Arial, sans-serif; 
            line-height: 1.6; 
            margin: 0; 
            padding: 20px; 
            background-image: url('background.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-color: #121212;
            color: #e0e0e0;
        }
        .container {
            background: rgba(30, 30, 30, 0.9);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            border: 1px solid #333;
            /* 手機版設定 */
            width: 90%;
            margin: 0 auto;
        }
        /* 電腦版設定 (寬度大於 768px) */
        @media (min-width: 768px) {
            .container {
                width: 60%;
            }
        }
        h1 { color: #f0f0f0; border-bottom: 2px solid #3498db; padding-bottom: 10px; font-size: 1.5em; }
        .collapsible { cursor: pointer; color: #5dade2; font-weight: bold; margin-bottom: 5px; display: block; padding: 10px 0; font-size: 1.1em; }
        .collapsible:hover { color: #85c1e9; }
        .content { display: none; padding-left: 20px; margin-bottom: 10px; }
        a { text-decoration: none; color: #5dade2; }
        a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="container">
<div class="nav" style="margin-bottom: 20px; padding: 10px; background: rgba(0,0,0,0.3); border-radius: 8px;"><a href="index.html">返回主頁</a> | <a href="#">2026年6月</a></div>
        <h1>📊 AI助理財經新聞總覽 📈</h1>
        
        <!-- 2026 -->
        <div class="collapsible" onclick="toggle(this)">▶ 2026年</div>
        <div class="content">
            <!-- 06 -->
            <div class="collapsible" onclick="toggle(this)">▶ 06月</div>
            <div class="content">
                <ul>
                    <li><a href="2026/06/2026-06-19.html">📄 2026-06-19 財經晨報</a></li>
                    <li><a href="2026/06/2026-06-18.html">📄 2026-06-18 財經晨報</a></li>
                </ul>
            </div>
        </div>
    </div>

    <script>
        function toggle(el) {
            var content = el.nextElementSibling;
            if (content.style.display === "block") {
                content.style.display = "none";
                el.innerHTML = el.innerHTML.replace("▼", "▶");
            } else {
                content.style.display = "block";
                el.innerHTML = el.innerHTML.replace("▶", "▼");
            }
        }
    </script>
</body>
</html>
