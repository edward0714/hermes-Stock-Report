<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 產業焦點 - 財經晨報</title>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans TC", sans-serif;
        background: linear-gradient(135deg, #0a0e1a, #111827);
        color: #e2e8f0;
        min-height: 100vh;
        padding: 30px 20px;
    }
    .container { max-width: 960px; margin: 0 auto; }
    .back-link {
        display: inline-block; color: #60a5fa; text-decoration: none;
        font-size: 14px; margin-bottom: 24px;
    }
    .back-link:hover { text-decoration: underline; }
    h1 {
        font-size: 2rem; font-weight: 800;
        background: linear-gradient(135deg, #60a5fa, #a78bfa);
        -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        margin-bottom: 8px;
    }
    .subtitle { color: #64748b; font-size: .95rem; margin-bottom: 32px; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; }
    .card {
        background: rgba(255,255,255,.03); border: 1px solid rgba(255,255,255,.08);
        border-radius: 12px; padding: 20px; transition: all .2s;
    }
    .card:hover { border-color: rgba(96,165,250,.3); transform: translateY(-2px); }
    .card-tag {
        display: inline-block; padding: 2px 8px; border-radius: 4px;
        font-size: .72rem; font-weight: 500; margin-bottom: 8px;
    }
    .tag-ai { background: rgba(59,130,246,.15); color: #60a5fa; }
    .tag-it { background: rgba(34,197,94,.15); color: #86efac; }
    .tag-security { background: rgba(239,68,68,.15); color: #fca5a5; }
    .tag-cloud { background: rgba(168,85,247,.15); color: #c084fc; }
    .card-title { font-size: 1rem; font-weight: 600; margin-bottom: 8px; line-height: 1.4; }
    .card-desc { font-size: .85rem; color: #94a3b8; line-height: 1.6; margin-bottom: 12px; }
    .card-meta { font-size: .78rem; color: #475569; display: flex; gap: 12px; }
    .card-source { color: #60a5fa; }
    .empty-state {
        text-align: center; padding: 80px 20px; color: #475569;
        grid-column: 1 / -1;
    }
    .empty-state .icon { font-size: 3rem; margin-bottom: 12px; }
    .empty-state h3 { font-size: 1.1rem; margin-bottom: 8px; color: #64748b; }
    .empty-state p { font-size: .9rem; }
    footer { margin-top: 48px; text-align: center; color: #475569; font-size: 13px; }
</style>
</head>
<body>
<div class="container">
    <a class="back-link" href="./index.html">← 回到歷史報告列表</a>
    <h1>🤖 AI 產業焦點</h1>
    <p class="subtitle">每週 AI / IT / 資安熱門話題整理 — 讓業務快速掌握銷售議題</p>
    <div class="grid" id="newsGrid">
        <div class="empty-state">
            <div class="icon">📡</div>
            <h3>內容建置中</h3>
            <p>每週 AI 產業重點話題即將上線，敬請期待</p>
        </div>
    </div>
    <footer>
        <a href="https://edward0714.github.io/" style="color:#60a5fa;text-decoration:none;">🌐 Edward Hu 首頁</a>
        &nbsp;|&nbsp;
        <a href="https://github.com/edward0714/hermes-Stock-Report" style="color:#60a5fa;text-decoration:none;">GitHub</a>
    </footer>
</div>
</body>
</html>
