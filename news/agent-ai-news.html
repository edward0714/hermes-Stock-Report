async function init() {
    const user = await requireAuth();
    if (!user) return;
    document.getElementById('navUser').textContent = `👤 ${user.display_name || user.username}`;
    // Render the pre-loaded report
    renderReport(AI_NEWS_DATA);
}
function logoutUser() { ApiClient.logout().then(() => { window.location.href = 'index.html'; }); }

function renderReport(data) {
    document.getElementById('metaWeek').textContent = data.week || '—';
    document.getElementById('metaCount').textContent = (data.topics || []).length + ' 則';

    document.getElementById('topicsContainer').innerHTML = (data.topics || []).map((t, i) => `
        <div class="topic-card">
            <div class="topic-hdr">
                <div class="topic-num">${i+1}</div>
                <div style="flex:1;min-width:0;">
                    <div class="topic-title">${t.title}</div>
                    <div class="topic-tags">${(t.tags||[]).map(tag => `<span class="topic-tag ${tag}">${tag}</span>`).join('')}</div>
                </div>
            </div>
            <div class="topic-summary">${t.summary}</div>
            ${t.sales_tip ? `<div class="topic-sales">💡 ${t.sales_tip}</div>` : ''}
            <div class="topic-ref">
                📎 參考來源：
                ${(t.refs||[]).map(r => `<a href="${r.url}" target="_blank" rel="noopener">${r.name}</a>`).join(' · ')}
            </div>
        </div>
    `).join('');
}

async function generateReport() {
    const btn = event.target;
    btn.disabled = true;
    btn.textContent = '⏳ 產生中...';
    try {
        const resp = await ApiClient._post('/ai-news/generate', {});
        if (resp && resp.topics) {
            localStorage.setItem('ai_news_report', JSON.stringify(resp));
            renderReport(resp);
            showToast('✅ 報告產生完成！', 'success');
        }
    } catch(e) {
        showToast('❌ 產生失敗：' + e.message, 'error');
    } finally {
        btn.disabled = false;
        btn.textContent = '🚀 立即產生本週報告';
    }
}

init();
</script>
