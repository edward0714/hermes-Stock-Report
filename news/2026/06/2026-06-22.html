<!DOCTYPE html>
<html lang="zh-Hant">
<head>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Microsoft YaHei', 'SimHei', sans-serif;
            line-height: 1.8;
            color: #333;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            overflow: hidden;
        }
        
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 40px 30px;
            text-align: center;
        }
        
        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            font-weight: bold;
        }
        
        .header p {
            font-size: 1.1em;
            opacity: 0.9;
        }
        
        .content {
            padding: 40px 30px;
        }
        
        .section {
            margin-bottom: 40px;
        }
        
        .section h2 {
            font-size: 1.8em;
            color: #667eea;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 3px solid #667eea;
        }
        
        .market-view {
            display: grid;
            gap: 20px;
        }
        
        .view-item {
            padding: 15px;
            border-left: 4px solid;
            background: #f8f9fa;
            border-radius: 4px;
        }
        
        .view-item.bullish {
            border-left-color: #28a745;
            background: #d4edda;
        }
        
        .view-item.bearish {
            border-left-color: #dc3545;
            background: #f8d7da;
        }
        
        .view-item strong {
            display: block;
            margin-bottom: 8px;
            font-size: 1.05em;
        }
        
        .view-item p {
            font-size: 0.95em;
            line-height: 1.6;
        }
        
        .news-list {
            list-style: none;
        }
        
        .news-list li {
            padding: 15px;
            margin-bottom: 12px;
            background: #f8f9fa;
            border-left: 4px solid #667eea;
            border-radius: 4px;
            line-height: 1.7;
        }
        
        .news-list li:before {
            content: "▸ ";
            color: #667eea;
            font-weight: bold;
            margin-right: 8px;
        }
        
        .footer {
            background: #f8f9fa;
            padding: 20px 30px;
            text-align: center;
            color: #666;
            font-size: 0.9em;
            border-top: 1px solid #ddd;
        }
        
        .badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 3px;
            font-weight: bold;
            font-size: 0.85em;
            margin-right: 8px;
        }
        
        .badge.bullish-tag {
            background: #28a745;
            color: white;
        }
        
        .badge.bearish-tag {
            background: #dc3545;
            color: white;
        }
        
        @media (max-width: 768px) {
            .header h1 {
                font-size: 1.8em;
            }
            
            .content {
                padding: 20px 15px;
            }
            
            .section h2 {
                font-size: 1.4em;
            }
        }
    </style>
</head>

    </div>
</body>
</html>
